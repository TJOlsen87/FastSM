      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add fused_home timeline support and unified status deduplication"
          branch: feat/fused-home-timeline
          title: "Add fused_home timeline support"
          body: "Automated patch application: adds fused_home   timeline implementation and deduplication changes."
