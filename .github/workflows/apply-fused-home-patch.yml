name: Apply fused_home patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch and push branch
